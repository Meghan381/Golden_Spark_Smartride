<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden-Spark | Login</title>
    <link rel="stylesheet" href="login.css">
</head>

<body>
    <header>
        <div class="header-left">
            <div class="logo">✨</div>
            <h1>Golden-Spark</h1>
        </div>
        <nav><a href="index.html">Home</a></nav>
    </header>

    <div class="main-container">
        <div class="login-container">
            <div class="brand-side">
                <h2>Welcome Back! 👋</h2>
                <p>Access your dashboard to manage your journey.</p>
                <div class="demo-credentials">
                    <h4>New here?</h4>
                    <p>Create an account to get started as a Passenger, Driver, or Admin.</p>
                    <a href="register.html" style="display: inline-block; margin-top: 15px; padding: 10px 20px; background: #D4AF37; color: black; text-decoration: none; border-radius: 8px; font-weight: bold;">Register Now</a>
                </div>
            </div>

            <div class="form-side">
                <h2>Login</h2>
                <div id="loginError" class="error-message" style="display: none;"></div>
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-with-icon">
                        <input type="password" id="login-pass" placeholder="Enter password">
                        <span class="toggle-password" onclick="togglePass('login-pass')">👁️</span>
                    </div>
                </div>
                
                <button class="register-btn" onclick="handleLogin()">Sign In</button>
                
                <div class="register-link">New here? <a href="register.html">Register</a></div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>

</html>
